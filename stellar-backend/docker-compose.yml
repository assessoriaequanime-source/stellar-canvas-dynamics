version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stellar-postgres
    environment:
      POSTGRES_DB: stellar_db
      POSTGRES_USER: stellar_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - stellar_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellar_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stellar-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - stellar_redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stellar_network
    restart: unless-stopped

volumes:
  stellar_postgres_data:
    driver: local
  stellar_redis_data:
    driver: local

networks:
  stellar_network:
    driver: bridge
