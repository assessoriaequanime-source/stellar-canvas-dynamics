# Nginx Configuration for SingulAI – singulai.live
# INSTRUÇÕES DE INSTALAÇÃO NA VPS
# 
# Step 1: Copiar para sites-available
#    cp nginx-stellar-backend.conf /etc/nginx/sites-available/singulai-live
#
# Step 2: Ativar o site
#    ln -s /etc/nginx/sites-available/singulai-live /etc/nginx/sites-enabled/singulai-live
#
# Step 3: Validar configuração
#    nginx -t
#
# Step 4: Recarregar Nginx
#    systemctl reload nginx
#
# Step 5: SSL (somente após DNS ativo: singulai.live → 72.60.147.56)
#    certbot certonly --nginx -d singulai.live -d www.singulai.live

server {
    listen 80;
    listen [::]:80;
    server_name singulai.live www.singulai.live;

    # Logs segregados
    access_log /var/log/nginx/singulai-live-access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/singulai-live-error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting (10 req/s per IP)
    limit_req_zone $binary_remote_addr zone=singulai_limit:10m rate=10r/s;
    limit_req zone=singulai_limit burst=20 nodelay;

    # Rewrite /alt-api/* -> /api/v1/* for frontend compatibility
    rewrite ^/alt-api/(.*)$ /api/v1/$1 break;

    # Reverse proxy to backend (port 9200 internal)
    location / {
        proxy_pass http://127.0.0.1:9200;
        proxy_http_version 1.1;

        # Connection headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint (no logging)
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:9200/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Metrics endpoint (restricted)
    location /metrics {
        access_log off;
        proxy_pass http://127.0.0.1:9200/metrics;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }
}
